name: Deploy Frontend (production)

# Manual-only production deploy of apps/frontend to Vercel.
# Does NOT touch the backend - see deploy-backend.yml for that.
# Trigger from the GitHub UI: Actions -> "Deploy Frontend (production)" -> Run workflow.
#
# Requires three repository secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       - a Vercel access token (vercel.com/account/tokens)
#   VERCEL_ORG_ID      - from .vercel/project.json after running `vercel link`
#   VERCEL_PROJECT_ID  - from .vercel/project.json after running `vercel link`

on:
  workflow_dispatch:

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & deploy frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter frontend run lint

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
